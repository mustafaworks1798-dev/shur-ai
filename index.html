<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>مساعد AI الشعري</h1>
        <div class="chat-box">
            <input type="text" id="question" placeholder="اكتب سؤالك هنا..." autocomplete="off">
            <button id="sendBtn">إرسال</button>
        </div>

        <div id="response" class="response">
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                جاري التحميل...
            </div>
            <div id="answer"></div>
        </div>

        <!-- BEGIN AADS AD UNIT 2436757 -->
        <div id="frame" style="width: 100%; margin: auto; position: relative; z-index: 99998;">
            <iframe data-aa="2436757" src="//acceptable.a-ads.com/2436757/?size=Adaptive"
                    style="border:0; padding:0; width:70%; height:auto; overflow:hidden; display:block; margin:auto"></iframe>
        </div>
        <!-- END AADS AD UNIT 2436757 -->
    </div>

    <script src="script.js"></script>
    <script>
        const sendBtn = document.getElementById('sendBtn');
        const questionInput = document.getElementById('question');
        const loadingDiv = document.getElementById('loading');
        const answerDiv = document.getElementById('answer');

        function showAnswer(answer) {
            answerDiv.innerHTML = formatResponseText(answer);
        }

        sendBtn.addEventListener('click', async () => {
            const question = questionInput.value.trim();
            if (!question) return;

            loadingDiv.classList.remove('hidden');
            answerDiv.textContent = '';
            sendBtn.disabled = true;

            try {
                const answer = await text(question);
                showAnswer(answer);
            } catch (error) {
                showAnswer('حدث خطأ: ' + error.message);
            } finally {
                loadingDiv.classList.add('hidden');
                sendBtn.disabled = false;
            }
        });

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
